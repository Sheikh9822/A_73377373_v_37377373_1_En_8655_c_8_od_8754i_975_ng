name: Cleanup Workflow Runs (Keep Latest 100)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # Daily at 3AM UTC

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs (keep latest 100)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRuns = 100;

            console.log(`Keeping latest ${keepRuns} runs per workflow`);

            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo,
            });

            for (const workflow of workflows.data.workflows) {
              console.log(`Checking workflow: ${workflow.name}`);

              let page = 1;
              let allRuns = [];

              while (true) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  per_page: 100,
                  page: page,
                });

                if (runs.data.workflow_runs.length === 0) break;

                allRuns.push(...runs.data.workflow_runs);
                page++;
              }

              if (allRuns.length <= keepRuns) {
                console.log(`No runs to delete for ${workflow.name}`);
                continue;
              }

              const runsToDelete = allRuns.slice(keepRuns);

              for (const run of runsToDelete) {
                console.log(`Deleting run ${run.id}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              }
            }

            console.log("Cleanup complete.");