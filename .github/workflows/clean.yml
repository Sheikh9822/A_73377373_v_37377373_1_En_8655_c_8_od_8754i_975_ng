name: Cleanup Workflow Runs and Artifacts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete old workflow runs and artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const keepRuns = 50;

            console.log(`Keeping latest ${keepRuns} runs per workflow`);

            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo,
            });

            for (const workflow of workflows.data.workflows) {

              let page = 1;
              let allRuns = [];

              while (true) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  per_page: 100,
                  page: page,
                });

                if (runs.data.workflow_runs.length === 0) break;

                allRuns.push(...runs.data.workflow_runs);
                page++;
              }

              if (allRuns.length <= keepRuns) continue;

              // Fix: sort descending by run number to ensure we keep the latest runs
              allRuns.sort((a, b) => b.run_number - a.run_number);

              const runsToDelete = allRuns.slice(keepRuns);

              for (const run of runsToDelete) {
                console.log(`Deleting run ${run.id}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              }
            }

            console.log("Deleting all artifacts...");

            // Fix: always fetch page 1 since the list shrinks as artifacts are deleted.
            // Paginating forward causes items to be skipped.
            while (true) {
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page: 1,
              });

              if (artifacts.data.artifacts.length === 0) break;

              for (const artifact of artifacts.data.artifacts) {
                console.log(`Deleting artifact ${artifact.id}`);
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
              }
            }

            console.log("Cleanup complete.");
